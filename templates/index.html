<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поросёнок и радио</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="scene">
    <header class="title">
      <h1>Поросёнок под деревом</h1>
      <p class="subtitle">слушает радио и ловит эфир</p>
    </header>

    <figure class="hero">
      <img
        src="{{ url_for('static', filename='images/pig-radio.jpg') }}"
        alt="Свинья под деревом слушает радиоприёмник"
        class="hero-image"
        width="1024"
        height="1024"
      >
      <div class="static-overlay" id="static-overlay" aria-hidden="true"></div>
    </figure>

    <section class="panel">
      <div class="station-display">
        <span class="label">Сейчас в эфире</span>
        <h2 id="station-name">—</h2>
        <p id="station-info"><span id="station-freq">—</span> МГц · <span id="station-genre">—</span></p>
      </div>

      <div class="status">
        <span class="indicator" id="signal-indicator"></span>
        <span id="status-text">Настройка приёмника…</span>
      </div>

      <div class="static-bar" id="static-bar">
        <div class="static-fill" id="static-fill"></div>
      </div>
    </section>
  </main>

  <script>
    window.STATIONS = {{ stations | tojson }};
  </script>
  <script src="{{ url_for('static', filename='js/radio.js') }}"></script>
</body>
</html>
